<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micro:bit Radar Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.15);
      --green-glow: rgba(34,197,94,0.4);
      --red: #ef4444;
      --red-glow: rgba(239,68,68,0.5);
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #27272a;
      --text: #a1a1aa;
      --text-bright: #f4f4f5;
      --text-dim: #52525b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .logo { display: flex; align-items: center; gap: 0.75rem; }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 6px;
      background: var(--green-dim); border: 1px solid rgba(34,197,94,0.2);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-title { font-size: 13px; font-weight: 700; color: var(--text-bright); text-transform: uppercase; letter-spacing: 0.1em; }
    .logo-sub { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.2em; }

    .header-nav { display: flex; align-items: center; gap: 6px; }
    .nav-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 13px; border-radius: 9999px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: #18181b; color: #a1a1aa;
      transition: all 0.18s;
    }
    .nav-btn:hover { background: #27272a; color: #f4f4f5; }
    .nav-btn.open { background: var(--green-dim); color: var(--green); border-color: rgba(34,197,94,0.35); }

    #btn-connect {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px; border-radius: 9999px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: #27272a; color: #d4d4d8;
      transition: all 0.2s;
    }
    #btn-connect.connected { background: var(--green-dim); color: var(--green); border-color: rgba(34,197,94,0.3); }

    /* PANELS */
    #panels-bar { position: sticky; top: 64px; z-index: 40; background: rgba(0,0,0,0.85); backdrop-filter: blur(14px); border-bottom: 1px solid transparent; }
    #panels-bar.open { border-bottom-color: var(--border); }
    .drop-inner { padding: 1rem 1.5rem; border-top: 1px solid var(--border); }
    .drop-cols { display: flex; flex-wrap: wrap; gap: 1.5rem; }

    /* TELEMETRY */
    .tele-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-dim); margin-bottom: 4px; }
    .tele-value { font-size: 28px; font-family: monospace; color: var(--text-bright); font-weight: 700; }

    /* RADAR */
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .radar-wrap {
      position: relative; width: 100%; max-width: 520px; aspect-ratio: 1;
      border-radius: 50%; border: 3px solid var(--border);
      background: #000; overflow: hidden;
    }
    #radar-canvas { width: 100%; height: 100%; display: block; }

    /* LOG */
    .log-list { overflow-y: auto; max-height: 160px; display: flex; flex-direction: column; gap: 4px; font-family: monospace; font-size: 10px; }
    .log-entry { padding: 6px; border-radius: 4px; background: rgba(39,39,42,0.3); border: 1px solid rgba(39,39,42,0.5); }
    .log-entry.alert { color: var(--red); background: rgba(239,68,68,0.05); }

    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #18181b; border: 1px solid var(--border); border-radius: 8px; padding: 10px 18px; font-size: 12px; display: none; z-index: 999; }
    #toast.show { display: block; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📡</div>
    <div>
      <div class="logo-title">Micro:bit Radar</div>
      <div class="logo-sub">Tactical Scanner</div>
    </div>
  </div>
  <nav class="header-nav">
    <button class="nav-btn" onclick="toggleOpciones()" id="nav-opciones">Opciones</button>
  </nav>
  <button id="btn-connect">Conectar Micro:bit</button>
</header>

<div id="panels-bar">
  <div id="opciones-wrap" style="overflow:hidden;max-height:0;opacity:0;transition:all 0.3s;">
    <div class="drop-inner">
      <div class="drop-cols">
        <div>
          <div class="tele-label">Ángulo</div>
          <div class="tele-value" id="tele-angle">--°</div>
        </div>
        <div>
          <div class="tele-label">Distancia</div>
          <div class="tele-value" id="tele-dist">-- cm</div>
        </div>
        <div>
          <div class="tele-label">Rango Máx</div>
          <input type="range" id="range-dist" min="20" max="200" value="100">
          <div style="font-size:10px; text-align:right;" id="range-val">100cm</div>
        </div>
      </div>
      <div class="log-list" id="log-list" style="margin-top:1rem;"></div>
    </div>
  </div>
</div>

<main>
  <div class="radar-wrap">
    <canvas id="radar-canvas" width="600" height="600"></canvas>
  </div>
</main>

<div id="toast"></div>

<script>
  const UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
  const UART_RX_CHAR  = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

  let device = null, characteristic = null;
  let connected = false;
  let lastData = null;
  const radarMap = new Array(360).fill(null);
  let lastSweepAngle = -1;
  let maxDistance = 100;
  const alertDist = 30;

  const btnConnect = document.getElementById('btn-connect');
  const canvas = document.getElementById('radar-canvas');
  const ctx = canvas.getContext('2d');

  // --- BLUETOOTH ---
  btnConnect.addEventListener('click', async () => {
    if (connected) {
      if (device?.gatt?.connected) device.gatt.disconnect();
      setConnected(false);
      return;
    }
    try {
      device = await navigator.bluetooth.requestDevice({
        filters: [{ namePrefix: 'BBC micro:bit' }],
        optionalServices: [UART_SERVICE]
      });
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(UART_SERVICE);
      characteristic = await service.getCharacteristic(UART_RX_CHAR);
      await characteristic.startNotifications();
      characteristic.addEventListener('characteristicvaluechanged', onData);
      setConnected(true);
    } catch (err) {
      console.error(err);
      showToast('Error de conexión: ' + err.message);
    }
  });

  function onData(event) {
    const raw = new TextDecoder().decode(event.target.value).trim();
    let angle = NaN, distance = NaN;
    raw.split(',').forEach(part => {
      if (part.startsWith('A:')) angle = parseInt(part.slice(2));
      if (part.startsWith('D:')) distance = parseInt(part.slice(2));
    });

    if (!isNaN(angle) && !isNaN(distance)) {
      angle = angle % 360;
      lastData = { angle, distance };
      // Guardar punto con sweepAge inicial de 0
      radarMap[Math.round(angle) % 360] = { angle, distance, sweepAge: 0, timestamp: Date.now() };
      updateUI();
    }
  }

  function setConnected(val) {
    connected = val;
    btnConnect.textContent = val ? 'Desconectar' : 'Conectar Micro:bit';
    btnConnect.classList.toggle('connected', val);
  }

  function updateUI() {
    document.getElementById('tele-angle').textContent = lastData.angle + '°';
    document.getElementById('tele-dist').textContent = lastData.distance + ' cm';
    
    const log = document.getElementById('log-list');
    const entry = document.createElement('div');
    entry.className = 'log-entry' + (lastData.distance < alertDist ? ' alert' : '');
    entry.textContent = `A:${lastData.angle}° D:${lastData.distance}cm`;
    log.prepend(entry);
    if (log.children.length > 10) log.lastChild.remove();
  }

  function toggleOpciones() {
    const wrap = document.getElementById('opciones-wrap');
    const isOpen = wrap.style.opacity === '1';
    wrap.style.maxHeight = isOpen ? '0' : '400px';
    wrap.style.opacity = isOpen ? '0' : '1';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  document.getElementById('range-dist').addEventListener('input', (e) => {
    maxDistance = parseInt(e.target.value);
    document.getElementById('range-val').textContent = maxDistance + 'cm';
  });

  // --- RENDER ---
  function render() {
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;
    const R = Math.min(cx, cy) - 30;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = '#1a2e1a';
    for (let i = 1; i <= 4; i++) {
      ctx.beginPath();
      ctx.arc(cx, cy, (R / 4) * i, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Actualizar sweepAge de todos los puntos
    if (lastData) {
      const currentSweep = Math.round(lastData.angle) % 360;
      if (lastSweepAngle >= 0 && currentSweep !== lastSweepAngle) {
        let delta = (currentSweep - lastSweepAngle + 360) % 360;
        for (let i = 0; i < 360; i++) {
          if (radarMap[i]) {
            radarMap[i].sweepAge += delta;
            // ELIMINAR PUNTO SI HA PASADO MÁS DE 180 GRADOS
            if (radarMap[i].sweepAge >= 180) {
              radarMap[i] = null;
            }
          }
        }
      }
      lastSweepAngle = currentSweep;
    }

    // Dibujar puntos
    for (let i = 0; i < 360; i++) {
      const pt = radarMap[i];
      if (!pt) continue;

      // Opacidad basada en sweepAge (desaparece a los 180°)
      const opacity = Math.max(0, 1 - pt.sweepAge / 180);
      if (opacity <= 0) continue;

      const rad = ((pt.angle - 90) * Math.PI) / 180;
      const distRatio = Math.min(pt.distance / maxDistance, 1);
      const x = cx + Math.cos(rad) * R * distRatio;
      const y = cy + Math.sin(rad) * R * distRatio;

      ctx.fillStyle = pt.distance < alertDist ? `rgba(239,68,68,${opacity})` : `rgba(34,197,94,${opacity})`;
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Sweep Line
    if (lastData) {
      const sRad = ((lastData.angle - 90) * Math.PI) / 180;
      ctx.strokeStyle = 'rgba(34,197,94,0.8)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(sRad) * R, cy + Math.sin(sRad) * R);
      ctx.stroke();
    }

    requestAnimationFrame(render);
  }

  render();
</script>
</body>
</html>
