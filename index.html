<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micro:bit Radar Scanner</title>

  <style>
    /* === ESTILOS ORIGINALES SIN MODIFICAR === */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --green:#22c55e; --green-dim:rgba(34,197,94,.15); --green-glow:rgba(34,197,94,.4);
      --red:#ef4444; --red-glow:rgba(239,68,68,.5);
      --bg:#0a0a0a; --surface:#111; --border:#27272a;
      --text:#a1a1aa; --text-bright:#f4f4f5; --text-dim:#52525b;
    }
    body { background:var(--bg); color:var(--text); font-family:system-ui; min-height:100vh; display:flex; flex-direction:column; }
    header { position:sticky; top:0; z-index:50; height:64px; padding:0 1.5rem;
      display:flex; align-items:center; justify-content:space-between;
      background:rgba(0,0,0,.75); backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border); }
    main { flex:1; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    footer { height:4px; background:linear-gradient(to right,transparent,rgba(34,197,94,.2),transparent); }
    .radar-wrap { position:relative; width:100%; max-width:520px; aspect-ratio:1;
      border-radius:50%; border:3px solid var(--border); background:#000; overflow:hidden; }
    #radar-canvas { width:100%; height:100%; display:block; }
    /* (resto de CSS original sin cambios por brevedad visual) */
  </style>
</head>

<body>

<header>
  <strong>Micro:bit Radar</strong>
  <button id="btn-connect">Conectar Micro:bit</button>
</header>

<main>
  <div class="radar-wrap">
    <canvas id="radar-canvas" width="600" height="600"></canvas>
  </div>
</main>

<footer></footer>

<script>
/* ───────── CONFIG ───────── */
const UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const UART_RX_CHAR = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

/* ───────── ESTADO ───────── */
let device = null;
let characteristic = null;
let connected = false;
let lastData = null;

const radarMap = new Array(360).fill(null);
let lastSweepAngle = -1;

let maxDistance = 50;
let calOffset = 0;
let calScale = 1.0;
let calDir = 1;
let alertDist = 15;

let pktCount = 0;
let errCount = 0;
let lastPktTimes = [];

/* ───────── DOM ───────── */
const btnConnect = document.getElementById('btn-connect');
const canvas = document.getElementById('radar-canvas');
const ctx = canvas.getContext('2d');

/* ───────── BLUETOOTH ───────── */
btnConnect.onclick = async () => {
  if (connected) return doDisconnect();
  await doConnect();
};

async function doConnect() {
  device = await navigator.bluetooth.requestDevice({
    filters: [{ namePrefix: 'BBC micro:bit' }],
    optionalServices: [UART_SERVICE]
  });

  const server = await device.gatt.connect();
  const service = await server.getPrimaryService(UART_SERVICE);
  characteristic = await service.getCharacteristic(UART_RX_CHAR);

  await characteristic.startNotifications();
  characteristic.addEventListener('characteristicvaluechanged', onData);

  connected = true;
  btnConnect.textContent = 'Conectado';
}

function doDisconnect() {
  if (device?.gatt?.connected) device.gatt.disconnect();
  connected = false;
  btnConnect.textContent = 'Conectar Micro:bit';
}

/* ───────── DATOS ───────── */
function onData(e) {
  const text = new TextDecoder().decode(e.target.value).trim();
  let angle = NaN, distance = NaN;

  text.split(',').forEach(p => {
    if (p.startsWith('A:')) angle = parseInt(p.slice(2));
    if (p.startsWith('D:')) distance = parseInt(p.slice(2));
  });

  if (isNaN(angle) || isNaN(distance)) {
    errCount++;
    return;
  }

  pktCount++;
  angle = (angle * calScale * calDir + calOffset + 3600) % 360;
  lastData = { angle, distance };

  radarMap[Math.round(angle)] = {
    angle: Math.round(angle),
    distance,
    sweepAge: 0,
    timestamp: Date.now()
  };
}

/* ───────── RENDER ───────── */
function render() {
  const W = canvas.width;
  const H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const R = Math.min(cx, cy) - 24;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  /* Sweep */
  if (lastData) {
    const currentSweep = Math.round(lastData.angle);
    const delta = lastSweepAngle >= 0 ? Math.abs(currentSweep - lastSweepAngle) : 0;

    for (let i = 0; i < 360; i++) {
      if (radarMap[i]) radarMap[i].sweepAge += delta;
    }
    lastSweepAngle = currentSweep;
  }

  /* Points */
  for (const pt of radarMap) {
    if (!pt) continue;
    const opacity = Math.max(0, 1 - pt.sweepAge / 340);
    if (opacity <= 0) continue;

    const rad = (pt.angle - 90) * Math.PI / 180;
    const distRatio = Math.min(pt.distance / maxDistance, 1);

    const x = cx + Math.cos(rad) * R * distRatio;
    const y = cy + Math.sin(rad) * R * distRatio;

    ctx.fillStyle = pt.distance < alertDist
      ? `rgba(239,68,68,${opacity})`
      : `rgba(34,197,94,${opacity})`;

    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(render);
}

render();
</script>

</body>
</html>
