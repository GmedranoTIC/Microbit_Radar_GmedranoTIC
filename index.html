<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Micro:bit Radar Scanner</title>

<style>
/* ================== ESTILOS ORIGINALES – SIN CAMBIOS ================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:#22c55e; --green-dim:rgba(34,197,94,0.15); --green-glow:rgba(34,197,94,0.4);
  --red:#ef4444;   --red-glow:rgba(239,68,68,0.5);
  --bg:#0a0a0a; --surface:#111111; --border:#27272a;
  --text:#a1a1aa; --text-bright:#f4f4f5; --text-dim:#52525b;
}
body {
  background:var(--bg); color:var(--text);
  font-family:system-ui,-apple-system,sans-serif;
  min-height:100vh; display:flex; flex-direction:column;
}
header {
  position:sticky; top:0; z-index:50; height:64px;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
  padding:0 1.5rem;
  background:rgba(0,0,0,.75); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.header-nav { display:flex; gap:6px; }
.nav-btn {
  display:flex; align-items:center; gap:6px;
  padding:5px 13px; border-radius:9999px;
  font-size:11px; font-weight:600; cursor:pointer;
  border:1px solid var(--border);
  background:#18181b; color:#a1a1aa;
}
.nav-btn.open {
  background:var(--green-dim); color:var(--green);
  border-color:rgba(34,197,94,.35);
}
#panels-bar {
  position:sticky; top:64px; z-index:40;
  background:rgba(0,0,0,.85); backdrop-filter:blur(14px);
}
.drop-inner { padding:1rem 1.5rem; border-top:1px solid var(--border); }
.drop-cols { display:flex; flex-wrap:wrap; gap:1.5rem; }
main { flex:1; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
.radar-center { display:flex; flex-direction:column; align-items:center; gap:1.5rem; }
.radar-wrap {
  position:relative; width:100%; max-width:520px; aspect-ratio:1;
  border-radius:50%; border:3px solid var(--border);
  background:#000; overflow:hidden;
  box-shadow:0 0 60px rgba(0,0,0,.6), inset 0 0 30px rgba(0,0,0,.4);
}
#radar-canvas { width:100%; height:100%; display:block; }
.radar-label {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-family:monospace; font-size:11px;
  color:rgba(34,197,94,.25);
  text-align:center; text-transform:uppercase;
}
.legend { display:flex; gap:2rem; }
.dot { width:8px; height:8px; border-radius:50%; }
.dot.green { background:var(--green); box-shadow:0 0 8px var(--green-glow); }
.dot.red { background:var(--red); box-shadow:0 0 8px var(--red-glow); }
.log-list { max-height:160px; overflow:auto; }
.log-entry { font-family:monospace; font-size:10px; padding:8px; }
footer {
  height:4px;
  background:linear-gradient(to right,transparent,rgba(34,197,94,.2),transparent);
}
</style>
</head>

<body>

<header>
  <div class="header-nav">
    <button class="nav-btn" id="nav-opciones" onclick="toggleOpciones()">Opciones</button>
  </div>
  <button id="btn-connect"><span id="btn-text">Conectar Micro:bit</span></button>
</header>

<div id="panels-bar">
  <div id="opciones-wrap" style="overflow:hidden; max-height:0; opacity:0; transition:.3s">
    <div class="drop-inner">
      <div class="drop-cols">
        <div>
          <div>Ángulo</div>
          <div id="tele-angle">--°</div>
        </div>
        <div>
          <div>Distancia</div>
          <div id="tele-dist">-- cm</div>
        </div>
      </div>
    </div>
  </div>
</div>

<main>
  <div class="radar-center">
    <div class="radar-wrap">
      <canvas id="radar-canvas" width="600" height="600"></canvas>
      <div class="radar-label">Radar System Active<br>by @GmedranoTIC</div>
    </div>
    <div class="legend">
      <div><span class="dot red"></span> Objeto</div>
      <div><span class="dot green"></span> Libre</div>
    </div>
  </div>
</main>

<footer></footer>

<script>
/* ======================= STATE ======================= */
let device=null, characteristic=null, connected=false;
let lastData=null;
const radarMap=new Array(360).fill(null);
let lastSweepAngle=-1;
let maxDistance=50, calOffset=0, calScale=1, calDir=1, alertDist=15;

/* ======================= DOM ======================= */
const canvas=document.getElementById('radar-canvas');
const ctx=canvas.getContext('2d');
const btnConnect=document.getElementById('btn-connect');
const teAngle=document.getElementById('tele-angle');
const teDist=document.getElementById('tele-dist');

/* ======================= BLUETOOTH ======================= */
btnConnect.onclick=async()=>{
  btnConnect.blur();
  alert("Aquí va tu lógica Bluetooth (no modificada)");
};

/* ======================= RADAR RENDER ======================= */
function render(){
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2, R=Math.min(cx,cy)-24;
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  if(lastData){
    const sweep=Math.round(lastData.angle);
    const delta=lastSweepAngle>=0?Math.abs(sweep-lastSweepAngle):0;
    radarMap.forEach(p=>{ if(p) p.sweepAge+=delta; });
    lastSweepAngle=sweep;
  }

  radarMap.forEach(pt=>{
    if(!pt) return;
    const opacity=Math.max(0,1-pt.sweepAge/340);
    if(opacity<=0) return;
    const rad=(pt.angle-90)*Math.PI/180;
    const d=Math.min(pt.distance/maxDistance,1);
    const x=cx+Math.cos(rad)*R*d;
    const y=cy+Math.sin(rad)*R*d;
    ctx.fillStyle=pt.distance<alertDist?
      `rgba(239,68,68,${opacity})`:`rgba(34,197,94,${opacity})`;
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
  });

  requestAnimationFrame(render);
}
render();

/* ======================= OPCIONES ======================= */
let open=false;
function toggleOpciones(){
  open=!open;
  const w=document.getElementById('opciones-wrap');
  w.style.maxHeight=open?w.scrollHeight+'px':'0';
  w.style.opacity=open?'1':'0';
}
</script>

</body>
</html>
